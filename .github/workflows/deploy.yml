name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true
      - name: Build WASM client
        run: |
          RUSTFLAGS="-C link-arg=--import-undefined" cargo build \
            --manifest-path client/Cargo.toml \
            --target wasm32-unknown-unknown \
            --release
      - name: Assemble static site
        run: |
          mkdir -p site
          cp src/index.html site/
          cp client/target/wasm32-unknown-unknown/release/client.wasm site/game.wasm
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - uses: actions/deploy-pages@v4
